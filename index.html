<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care & Talk (No-Setup Version)</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #ff6b6b; margin-bottom: 20px; font-size: 24px; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; }
        textarea { height: 80px; resize: none; }
        button { background-color: #4caf50; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #45a049; }
        .btn-connect { background-color: #008cba; }
        .btn-connect:hover { background-color: #007399; }
        .quick-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .quick-btn { background-color: #3b5998; color: white; padding: 10px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .quick-btn:hover { background-color: #2d4373; }
        .status { margin-top: 15px; font-size: 14px; color: #666; font-weight: bold; }
        #latest-msg { font-size: 22px; color: #333; margin-top: 15px; font-weight: bold; background: #ffe3e3; padding: 15px; border-radius: 8px; border: 2px dashed #ff6b6b; display: none; }
        .id-box { background: #e7f3fe; padding: 10px; border-radius: 8px; font-weight: bold; color: #0c5460; margin-bottom: 15px; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦷 Care & Talk</h1>
    
    <div id="my-id-display" class="id-box">กำลังสร้างรหัสเครื่อง...</div>

    <div id="connect-section">
        <input type="text" id="peer-id-input" placeholder="กรอกรหัสจากหน้าจอ Mac">
        <button class="btn-connect" onclick="connectToMac()">เชื่อมต่อกับ MacBook</button>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <textarea id="message-input" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled style="background-color: #ccc;">รอการเชื่อมต่อ...</button>
    
    <div class="quick-buttons">
        <button class="quick-btn" onclick="sendQuickMessage('ขอน้ำหน่อยครับ')">💧 ขอน้ำ</button>
        <button class="quick-btn" onclick="sendQuickMessage('ขอยาแก้ปวดหน่อย')">💊 ขอยาแก้ปวด</button>
        <button class="quick-btn" onclick="sendQuickMessage('เจ็บแผลจังเลย')">😭 เจ็บแผล</button>
        <button class="quick-btn" onclick="sendQuickMessage('อยากเข้าห้องน้ำ')">🚽 ไปห้องน้ำ</button>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <h3>ข้อความล่าสุด:</h3>
    <div id="latest-msg">ยังไม่มีข้อความ</div>
    <div id="status" class="status">🔴 ยังไม่พร้อมใช้งาน (คลิกที่นี่ 1 ครั้งเพื่อเปิดเสียง)</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
    let peer = new Peer();
    let conn = null;
    let audioUnlocked = false;

    // เมื่อสร้าง ID สำเร็จ (ฝั่ง Mac จะใช้เลขนี้)
    peer.on('open', (id) => {
        document.getElementById('my-id-display').innerText = "รหัสเครื่องของคุณ: " + id;
    });

    // ฝั่ง Mac: รอรับการเชื่อมต่อจากโทรศัพท์แฟน
    peer.on('connection', (connection) => {
        conn = connection;
        setupChat();
    });

    // ฝั่งแฟน: กดเชื่อมต่อไปยัง Mac
    function connectToMac() {
        const targetId = document.getElementById('peer-id-input').value.trim();
        if (targetId) {
            conn = peer.connect(targetId);
            setupChat();
        }
    }

    // เซ็ตอัประบบแชตเมื่อเชื่อมต่อกันติดแล้ว
    function setupChat() {
        document.getElementById('status').innerText = "🟢 เชื่อมต่อกันสำเร็จแล้ว!";
        document.getElementById('status').style.color = "#4caf50";
        document.getElementById('send-btn').disabled = false;
        document.getElementById('send-btn').style.backgroundColor = "#4caf50";
        document.getElementById('send-btn').innerText = "ส่งข้อความ & ออกเสียง";
        document.getElementById('connect-section').style.display = "none";

        // เวลาได้รับข้อความ (ฝั่ง Mac จะทำงาน)
        conn.on('data', (data) => {
            showAndSpeak(data);
        });
    }

    // ฟังก์ชันส่งข้อความ
    function sendMessage() {
        const text = document.getElementById('message-input').value.trim();
        if (text && conn) {
            conn.send(text);
            showAndSpeak(text);
            document.getElementById('message-input').value = '';
        }
    }

    // ฟังก์ชันส่งข้อความด่วน
    function sendQuickMessage(text) {
        if (conn && !document.getElementById('send-btn').disabled) {
            conn.send(text);
            showAndSpeak(text);
        }
    }

    // แสดงข้อความบนจอ + สั่งให้ Mac พูด
    function showAndSpeak(text) {
        const msgDiv = document.getElementById('latest-msg');
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';
        
        if (audioUnlocked) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            window.speechSynthesis.speak(utterance);
        }
    }

    // ปลดล็อกเสียงเบราว์เซอร์เมื่อมีการคลิกหน้าจอ
    document.body.addEventListener('click', () => {
        audioUnlocked = true;
        document.getElementById('status').innerText = "🟢 ระบบเสียงและแชตพร้อมทำงานแล้ว";
        // ลองสั่งพูดสั้นๆ เพื่อเทสเสียง
        const u = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(u);
    }, { once: true });
</script>

</body>
</html>
