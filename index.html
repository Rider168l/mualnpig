<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Care & Talk</title>

    <!-- ทำให้เปิดจากหน้าจอโฮมแล้วเต็มจอเหมือนแอพจริง (iOS) -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Care & Talk">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="icon" href="icon-512.png">

    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url('1.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(5px);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 { color: #ff6b6b; margin-bottom: 5px; font-size: 26px; }
        p.sub { color: #888; font-size: 13px; margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; }
        textarea { height: 80px; resize: none; }
        input[type=number] { font-size: 26px; text-align: center; font-weight: bold; color: #007bff; letter-spacing: 5px; }
        button { background-color: #4caf50; color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #45a049; }
        .btn-connect { background-color: #008cba; }
        .btn-connect:hover { background-color: #007399; }
        .btn-role { background-color: #ff6b6b; margin-bottom: 14px; padding: 20px; font-size: 18px; }
        .btn-role:hover { background-color: #e85555; }
        .btn-reset { background-color: #aaa; font-size: 13px; padding: 8px; margin-top: 15px; }
        .btn-reset:hover { background-color: #888; }
        .quick-buttons { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 15px; }
        .quick-btn { background-color: #007bff; color: white; padding: 16px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .quick-btn:hover { background-color: #0056b3; }
        #latest-msg { font-size: 28px; color: #d9534f; margin-top: 20px; font-weight: bold; background: #fdf7f7; padding: 20px; border-radius: 12px; border: 3px solid #d9534f; display: none; animation: bounce 0.5s ease; }
        .id-box { background: #e7f3fe; padding: 12px; border-radius: 8px; font-weight: bold; color: #004085; margin-bottom: 15px; font-size: 20px; border: 2px solid #b8daff; }
        .audio-box { padding: 14px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; font-size: 15px; }
        .audio-off { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .audio-on { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        @keyframes bounce {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>🦷 MULAN Fun Kud</h1>
    <p class="sub">กำลังโหลด...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const PREFIX = "care-talk-fixed-";
    const app = document.getElementById('app');
    let peer, conn;
    let connections = []; // multiple MULAN devices can connect to one Rider
    let role = localStorage.getItem('ct_role');   // 'patient' or 'partner'
    let audioUnlocked = false;

    // ---------- ตรวจจับลิงก์ YouTube แล้วดึง video ID ----------
    function extractYouTubeId(text) {
        const match = text.match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
        return match ? match[1] : null;
    }

    // ---------- หน้าจอเลือก role ครั้งแรก ----------
    function renderRoleSelect() {
        app.innerHTML = `
            <h1>🦷 MULAN Fun Kud</h1>
            <p class="sub">เลือกว่าอุปกรณ์นี้คือใคร (เลือกครั้งเดียว จำไว้ตลอด)</p>
            <button class="btn-role" onclick="chooseRole('patient')">😷 Rider (ต้องฟังเสียง)</button>
            <button class="btn-role" style="background:#007bff" onclick="chooseRole('partner')">💌 MULAN (พิมพ์/กดส่งข้อความ)</button>
        `;
    }

    function chooseRole(r) {
        role = r;
        localStorage.setItem('ct_role', r);
        boot();
    }

    // ---------- boot ----------
    function boot() {
        if (!role) { renderRoleSelect(); return; }
        if (role === 'patient') startPatient(); else startPartner();
    }

    // ---------- ฝั่งคนไข้ (host, id คงที่) ----------
    function startPatient() {
        let code = localStorage.getItem('ct_patient_code');
        if (!code) {
            code = Math.floor(10 + Math.random() * 90).toString();
            localStorage.setItem('ct_patient_code', code);
        }

        app.innerHTML = `
            <h1>🦷 MULAN Fun Kud</h1>
            <div class="audio-box audio-off" id="audio-state">🔴 ยังไม่ได้เปิดเสียง — แตะหน้าจอตรงไหนก็ได้ 1 ครั้ง</div>
            <button style="background:#ffb700;margin-bottom:15px;" onclick="testVoice()">🔊 ทดสอบเสียง (กดตรงนี้ก่อนใช้จริง)</button>

            <div style="text-align:left;background:#f8f9fa;padding:14px;border-radius:10px;margin-bottom:15px;">
                <label style="font-size:13px;color:#555;font-weight:bold;">🗣️ เลือกเสียง</label>
                <select id="voice-select" style="width:100%;padding:8px;border-radius:6px;border:1px solid #ddd;margin:6px 0 12px;font-size:14px;" onchange="onVoiceChange()"></select>

                <label style="font-size:13px;color:#555;font-weight:bold;">ความเร็ว: <span id="rate-val">1.0</span>x</label>
                <input type="range" id="rate-range" min="0.5" max="2" step="0.1" value="1" style="width:100%;margin:4px 0 12px;" oninput="onRateChange(this.value)">

                <label style="font-size:13px;color:#555;font-weight:bold;">โทนเสียง: <span id="pitch-val">1.0</span></label>
                <input type="range" id="pitch-range" min="0" max="2" step="0.1" value="1" style="width:100%;margin:4px 0;" oninput="onPitchChange(this.value)">
            </div>
            <div id="my-id-display" class="id-box">รหัสเครื่องของคุณ: ${code}</div>
            <p class="sub" id="conn-status">รอ MULAN เชื่อมต่อ...</p>
            <hr style="margin:20px 0;border:0;border-top:1px solid #eee;">
            <h3>⚠️ ข้อความล่าสุด ⚠️</h3>
            <div id="latest-msg">ยังไม่มีข้อความ</div>
            <div id="yt-status" style="display:none;background:#fff3cd;color:#856404;border:2px solid #ffeeba;padding:14px;border-radius:10px;margin-top:12px;font-weight:bold;">
                🎵 กำลังเล่นเพลงจาก YouTube...
                <div id="yt-player" style="width:1px;height:1px;overflow:hidden;position:absolute;"></div>
                <button id="yt-play-btn" style="display:none;margin-top:10px;background:#ffb700;" onclick="manualPlayYouTube()">▶️ กดเพื่อเล่นเสียง</button>
            </div>
            <audio id="local-audio" src="67.mp3" preload="auto"></audio>
            <div id="mp3-status" style="display:none;background:#e2e3ff;color:#3730a3;border:2px solid #c7d2fe;padding:14px;border-radius:10px;margin-top:12px;font-weight:bold;">
                🎶 กำลังเล่นเพลง 67.mp3...
                <button id="mp3-play-btn" style="display:none;margin-top:10px;background:#ffb700;" onclick="manualPlayMp3()">▶️ กดเพื่อเล่นเสียง</button>
            </div>
            <div class="quick-buttons" id="reply-buttons" style="display:none;">
                <button class="quick-btn" style="background:#28a745;" onclick="sendReply('กำลังไปแล้ว 🏃')">🏃 กำลังไปแล้ว</button>
                <button class="quick-btn" style="background:#28a745;" onclick="sendReply('รอแป๊บนึงนะ')">⏳ รอแป๊บนึงนะ</button>
                <button class="quick-btn" style="background:#28a745;" onclick="sendReply('โอเค เข้าใจแล้ว 👍')">👍 โอเค เข้าใจแล้ว</button>
            </div>
            <div id="reply-typebox" style="display:none;margin-top:12px;">
                <textarea id="reply-input" placeholder="หรือพิมพ์ตอบเอง..."></textarea>
                <button style="background:#28a745;" onclick="sendCustomReply()">ส่งคำตอบ</button>
            </div>
            <button class="btn-reset" onclick="resetAll()">🔄 รีเซ็ตอุปกรณ์นี้ (เปลี่ยน role/รหัส)</button>
        `;

        // ปลดล็อกเสียงจากการแตะที่ไหนก็ได้บนหน้าจอ (แก้ปัญหาเสียงไม่ออกบน iPhone)
        document.addEventListener('click', tryUnlockAudio);
        document.addEventListener('touchend', tryUnlockAudio);

        loadThaiVoice();

        // คอยปลุกระบบเสียงทุก 10 วิ กัน iOS หลับ/ปิดเสียงเงียบๆ หลังไม่ได้ใช้งานสักพัก
        setInterval(() => {
            if (audioUnlocked && document.visibilityState === 'visible') {
                try {
                    const u = new SpeechSynthesisUtterance(' ');
                    u.volume = 0.01;
                    window.speechSynthesis.speak(u);
                } catch (e) {}
            }
        }, 10000);

        peer = new Peer(PREFIX + code, { debug: 1 });

        peer.on('error', (err) => {
            document.getElementById('conn-status').innerText = "❌ ปัญหาระบบ: " + err.type + " (ลองปิดเปิดแอพใหม่)";
        });

        // peer หลุดจาก signaling server (เช่น เครื่องหลับ/สลับแท็บนาน) -> ต่อกลับเองอัตโนมัติ
        peer.on('disconnected', () => {
            document.getElementById('conn-status').innerText = "🟡 หลุดจากเซิร์ฟเวอร์ กำลังต่อกลับ...";
            setTimeout(() => { if (peer && !peer.destroyed) peer.reconnect(); }, 1000);
        });

        // เวลาสลับกลับมาที่แท็บนี้ ให้เช็คแล้วต่อกลับทันทีถ้าหลุดอยู่
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && peer && peer.disconnected && !peer.destroyed) {
                peer.reconnect();
            }
        });

        requestWakeLock();

        peer.on('connection', (connection) => {
            connections.push(connection);
            updateConnStatus();
            document.getElementById('reply-buttons').style.display = 'grid';
            document.getElementById('reply-typebox').style.display = 'block';
            connection.on('data', (data) => {
                if (data && data.type === 'quick') showAndSpeak(data.text);
                if (data && data.type === 'youtube') playYouTubeAudio(data.videoId);
                if (data && data.type === 'playmp3') playLocalMp3();
            });
            connection.on('close', () => {
                connections = connections.filter(c => c !== connection);
                updateConnStatus();
                if (connections.length === 0) {
                    document.getElementById('reply-buttons').style.display = 'none';
                    document.getElementById('reply-typebox').style.display = 'none';
                }
            });
        });
    }

    function updateConnStatus() {
        const el = document.getElementById('conn-status');
        if (!el) return;
        el.innerText = connections.length > 0
            ? `🟢 เชื่อมต่อกับ MULAN ${connections.length} เครื่อง`
            : "รอ MULAN เชื่อมต่อ...";
    }

    // ---------- เล่นเสียงจากลิงก์ YouTube (ฝั่งคนไข้) ----------
    let ytPlayer = null;
    let ytApiReady = false;
    let pendingYtVideoId = null;

    window.onYouTubeIframeAPIReady = function () {
        ytApiReady = true;
        if (pendingYtVideoId) {
            const id = pendingYtVideoId;
            pendingYtVideoId = null;
            playYouTubeAudio(id);
        }
    };

    function playYouTubeAudio(videoId) {
        const statusBox = document.getElementById('yt-status');
        const playBtn = document.getElementById('yt-play-btn');
        if (statusBox) statusBox.style.display = 'block';

        if (!ytApiReady || !document.getElementById('yt-player')) {
            pendingYtVideoId = videoId;
            return;
        }

        if (!ytPlayer) {
            ytPlayer = new YT.Player('yt-player', {
                height: '1',
                width: '1',
                videoId: videoId,
                playerVars: { autoplay: 1, playsinline: 1 },
                events: {
                    onReady: (e) => {
                        e.target.playVideo();
                        if (playBtn) playBtn.style.display = 'none';
                    },
                    onError: () => {
                        if (statusBox) statusBox.innerText = '❌ เล่นเพลงนี้ไม่ได้ (วิดีโออาจถูกจำกัดการฝัง)';
                    }
                }
            });
        } else {
            ytPlayer.loadVideoById(videoId);
            if (playBtn) playBtn.style.display = 'none';
        }

        if (navigator.vibrate) navigator.vibrate(200);

        // เผื่อ autoplay ถูกบล็อก โชว์ปุ่มกดเล่นเองหลังจากรอสักครู่
        setTimeout(() => {
            try {
                if (ytPlayer && ytPlayer.getPlayerState && ytPlayer.getPlayerState() !== 1) {
                    if (playBtn) playBtn.style.display = 'block';
                }
            } catch (e) {}
        }, 1500);
    }

    function manualPlayYouTube() {
        if (!ytPlayer) return;
        try {
            ytPlayer.playVideo();
            const playBtn = document.getElementById('yt-play-btn');
            if (playBtn) playBtn.style.display = 'none';
        } catch (e) {}
    }

    // ---------- เล่นไฟล์ 67.mp3 ในเครื่อง (ฝั่งคนไข้) ----------
    function playLocalMp3() {
        const audioEl = document.getElementById('local-audio');
        const statusBox = document.getElementById('mp3-status');
        const playBtn = document.getElementById('mp3-play-btn');
        if (!audioEl) return;

        if (statusBox) statusBox.style.display = 'block';
        if (navigator.vibrate) navigator.vibrate(200);

        try {
            audioEl.currentTime = 0;
        } catch (e) {}

        const playPromise = audioEl.play();
        if (playPromise && playPromise.catch) {
            playPromise
                .then(() => { if (playBtn) playBtn.style.display = 'none'; })
                .catch(() => { if (playBtn) playBtn.style.display = 'block'; });
        }
    }

    function manualPlayMp3() {
        const audioEl = document.getElementById('local-audio');
        if (!audioEl) return;
        audioEl.play().then(() => {
            const playBtn = document.getElementById('mp3-play-btn');
            if (playBtn) playBtn.style.display = 'none';
        }).catch(() => {});
    }

    let thaiVoice = null;
    let allVoices = [];
    let speechRate = parseFloat(localStorage.getItem('ct_rate')) || 1.0;
    let speechPitch = parseFloat(localStorage.getItem('ct_pitch')) || 1.0;
    let savedVoiceURI = localStorage.getItem('ct_voice_uri') || null;

    function loadThaiVoice() {
        function pick() {
            allVoices = window.speechSynthesis.getVoices();
            // เอาเสียงไทยก่อน ถ้าไม่มีก็โชว์ทุกเสียงให้เลือกเอง
            let list = allVoices.filter(v => v.lang && v.lang.toLowerCase().startsWith('th'));
            if (list.length === 0) list = allVoices;

            const select = document.getElementById('voice-select');
            if (select && list.length > 0) {
                select.innerHTML = list.map(v =>
                    `<option value="${v.voiceURI}">${v.name} (${v.lang})</option>`
                ).join('');

                let chosen = list.find(v => v.voiceURI === savedVoiceURI) || list[0];
                select.value = chosen.voiceURI;
                thaiVoice = chosen;
            }

            const rateRange = document.getElementById('rate-range');
            const pitchRange = document.getElementById('pitch-range');
            if (rateRange) { rateRange.value = speechRate; document.getElementById('rate-val').innerText = speechRate.toFixed(1); }
            if (pitchRange) { pitchRange.value = speechPitch; document.getElementById('pitch-val').innerText = speechPitch.toFixed(1); }
        }
        pick();
        window.speechSynthesis.onvoiceschanged = pick;
    }

    function onVoiceChange() {
        const select = document.getElementById('voice-select');
        const chosen = allVoices.find(v => v.voiceURI === select.value);
        if (chosen) {
            thaiVoice = chosen;
            localStorage.setItem('ct_voice_uri', chosen.voiceURI);
        }
    }

    function onRateChange(val) {
        speechRate = parseFloat(val);
        document.getElementById('rate-val').innerText = speechRate.toFixed(1);
        localStorage.setItem('ct_rate', speechRate);
    }

    function onPitchChange(val) {
        speechPitch = parseFloat(val);
        document.getElementById('pitch-val').innerText = speechPitch.toFixed(1);
        localStorage.setItem('ct_pitch', speechPitch);
    }

    function speakText(text, onDone) {
        try {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (thaiVoice) {
                utterance.voice = thaiVoice;
                utterance.lang = thaiVoice.lang;
            } else {
                utterance.lang = 'th-TH';
            }
            utterance.rate = speechRate;
            utterance.pitch = speechPitch;
            utterance.onend = () => onDone && onDone(true);
            utterance.onerror = (ev) => onDone && onDone(false, ev.error);
            window.speechSynthesis.speak(utterance);
        } catch (e) {
            onDone && onDone(false, e.message);
        }
    }

    function testVoice() {
        tryUnlockAudio();
        const status = document.getElementById('conn-status');
        const voiceInfo = thaiVoice ? `(voice: ${thaiVoice.name})` : '(ไม่พบ voice ไทย จะใช้ default)';
        speakText('ทดสอบเสียง คนไข้พร้อมรับข้อความแล้วค่ะ', (ok, err) => {
            if (status) status.innerText = ok
                ? '✅ เสียงทำงานปกติ ' + voiceInfo
                : `❌ พูดไม่ได้ — error: ${err} ${voiceInfo}`;
        });
    }

    function tryUnlockAudio() {
        if (audioUnlocked) return;
        audioUnlocked = true;
        try {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(' ');
            window.speechSynthesis.speak(u);
        } catch (e) {}
        const el = document.getElementById('audio-state');
        if (el) {
            el.innerText = "🟢 เปิดเสียงเรียบร้อยแล้ว (ลองกด \"ทดสอบเสียง\" ด้านล่างด้วย)";
            el.classList.remove('audio-off');
            el.classList.add('audio-on');
        }
    }

    function showAndSpeak(text) {
        const msgDiv = document.getElementById('latest-msg');
        if (!msgDiv) return;
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';

        if (audioUnlocked) {
            speakText(text, (ok) => {
                const status = document.getElementById('conn-status');
                if (status && !ok) status.innerText = '❌ พูดไม่ได้ตอนนี้ ลองกด "ทดสอบเสียง" อีกครั้ง';
            });
        }
    }

    function sendReply(text) {
        connections.forEach(c => { if (c.open) c.send({ type: 'reply', text: text }); });
    }

    function sendCustomReply() {
        const input = document.getElementById('reply-input');
        const text = input.value.trim();
        if (text) {
            connections.forEach(c => { if (c.open) c.send({ type: 'reply', text: text }); });
            input.value = '';
        }
    }

    // ---------- ฝั่งแฟน (ต่อไปหา id คงที่ของคนไข้) ----------
    function startPartner() {
        const savedTarget = localStorage.getItem('ct_target_code');
        app.innerHTML = `
            <h1>🦷 MULAN Fun Kud</h1>
            <div id="connect-section">
                <p class="sub">กรอกรหัส 2 ตัวที่เห็นบนจอคนไข้ (กรอกครั้งเดียว ครั้งต่อไปเชื่อมอัตโนมัติ)</p>
                <input type="number" id="peer-id-input" placeholder="รหัส 2 ตัว" inputmode="numeric"
                    value="${savedTarget || ''}"
                    oninput="if(this.value.length > 2) this.value = this.value.slice(0,2);">
                <button class="btn-connect" onclick="connectToPatient()">เชื่อมต่อ</button>
            </div>
            <p class="sub" id="conn-status" style="margin-top:15px;"></p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <textarea id="message-input" placeholder="พิมพ์ข้อความ หรือวางลิงก์ YouTube เพื่อเปิดเพลงให้ฟัง..."></textarea>
            <button onclick="sendMessage()">ส่งข้อความด่วน</button>
            <div class="quick-buttons">
                <button class="quick-btn" onclick="sendQuickMessage('ใช่จ้า')">ใช่จ้าาาา</button>
                <button class="quick-btn" onclick="sendQuickMessage('ไม่ใช่จ้า')">ไม่ใช่จ้า</button>
                <button class="quick-btn" onclick="sendQuickMessage('มานอนด้วยกัน')">😭 มานอนด้วยกัน</button>
                <button class="quick-btn" onclick="sendQuickMessage('อยากกินข้าวแล้ว')">🍚 อยากกินข้าวแล้ว</button>
                <button class="quick-btn" style="background:#6f42c1;" onclick="sendPlayMp3()">67</button>
            </div>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <h3>📩 คำตอบจาก Rider</h3>
            <div id="latest-reply" style="font-size:18px;color:#28a745;font-weight:bold;background:#f0fdf4;padding:14px;border-radius:10px;border:2px solid #c3e6cb;display:none;">ยังไม่มีคำตอบ</div>
            <button class="btn-reset" onclick="resetAll()">🔄 รีเซ็ตอุปกรณ์นี้ (เปลี่ยน role/รหัส)</button>
        `;

        peer = new Peer({ debug: 1 });
        peer.on('open', () => {
            if (savedTarget) connectToPatient();
        });
        peer.on('error', (err) => {
            document.getElementById('conn-status').innerText = "❌ ปัญหาระบบ: " + err.type;
        });
        peer.on('disconnected', () => {
            document.getElementById('conn-status').innerText = "🟡 หลุดจากเซิร์ฟเวอร์ กำลังต่อกลับ...";
            setTimeout(() => { if (peer && !peer.destroyed) peer.reconnect(); }, 1000);
        });
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && peer && peer.disconnected && !peer.destroyed) {
                peer.reconnect();
            }
        });
    }

    function connectToPatient() {
        const targetId = document.getElementById('peer-id-input').value.trim();
        if (!targetId) return;
        document.getElementById('conn-status').innerText = "⏳ กำลังเชื่อมต่อ...";
        conn = peer.connect(PREFIX + targetId);

        conn.on('open', () => {
            localStorage.setItem('ct_target_code', targetId);
            document.getElementById('conn-status').innerText = "🟢 เชื่อมต่อสำเร็จแล้ว";
            document.getElementById('connect-section').style.display = 'none';
        });
        conn.on('data', (data) => {
            if (data && data.type === 'reply') {
                const box = document.getElementById('latest-reply');
                if (box) {
                    box.innerText = data.text;
                    box.style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate(200);
                }
            }
        });
        conn.on('error', () => {
            document.getElementById('conn-status').innerText = "❌ เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง";
        });
        conn.on('close', () => {
            document.getElementById('conn-status').innerText = "🔌 หลุดการเชื่อมต่อ กำลังลองใหม่...";
            setTimeout(connectToPatient, 2000);
        });
    }

    function sendMessage() {
        const text = document.getElementById('message-input').value.trim();
        if (!text || !conn || !conn.open) return;

        const videoId = extractYouTubeId(text);
        if (videoId) {
            conn.send({ type: 'youtube', videoId: videoId });
            const status = document.getElementById('conn-status');
            if (status) status.innerText = '🎵 ส่งเพลงแล้ว';
        } else {
            conn.send({ type: 'quick', text: text });
        }
        document.getElementById('message-input').value = '';
    }

    function sendQuickMessage(text) {
        if (conn && conn.open) conn.send({ type: 'quick', text: text });
    }

    function sendPlayMp3() {
        if (conn && conn.open) {
            conn.send({ type: 'playmp3' });
            const status = document.getElementById('conn-status');
            if (status) status.innerText = '🎶 ส่งคำสั่งเล่นเพลงแล้ว';
        }
    }

    function resetAll() {
        if (confirm('รีเซ็ตอุปกรณ์นี้ทั้งหมด (role + รหัสที่จำไว้)?')) {
            localStorage.removeItem('ct_role');
            localStorage.removeItem('ct_patient_code');
            localStorage.removeItem('ct_target_code');
            location.reload();
        }
    }

    // กันจอดับระหว่างเปิดแอพอยู่ (ช่วยไม่ให้ browser ถูกพักการทำงานตอนจอดับ)
    let wakeLock = null;
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                document.addEventListener('visibilitychange', async () => {
                    if (wakeLock !== null && document.visibilityState === 'visible') {
                        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
                    }
                });
            }
        } catch (e) {
            console.log('Wake lock ไม่รองรับหรือถูกปฏิเสธ:', e);
        }
    }

    boot();
</script>

</body>
</html>
